<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Электронное портфолио преподавателя ИРКПО</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- AUTH -->

    <div id="authPage" class="auth-page">

        <div class="auth-card">

            <h1>Портфолио преподавателя ИРКПО</h1>

            <input id="email" type="email" placeholder="Email">

            <input id="password" type="password" placeholder="Пароль">

            <button onclick="login()">Войти</button>

            <button onclick="register()">Регистрация</button>

        </div>

    </div>

    <!-- MAIN -->

    <div id="mainLayout" class="layout hidden">

        <aside class="sidebar">

            <h2>Портфолио</h2>

            <button onclick="loadDashboard()">
                Личный кабинет
            </button>

            <button onclick="loadPassport()">
                Модельный паспорт
            </button>

            <hr>

            <button onclick="loadModule('academic')">
                1.1.1 Успеваемость
            </button>

            <button onclick="loadModule('graduation')">
                1.2.2 ГИА
            </button>

            <button onclick="loadModule('achievements')">
                1.3.1 Конкурсы студентов
            </button>

            <button onclick="loadModule('projects')">
                1.3.2 Проектная деятельность
            </button>

            <button onclick="loadModule('methodical')">
                2.1.1 Методические материалы
            </button>

            <button onclick="loadModule('eor')">
                2.1.3 ЭОР
            </button>

            <button onclick="loadModule('experience')">
                2.3.1 Методические мероприятия
            </button>

            <button onclick="loadModule('contests')">
                2.4.1 Конкурсы профмастерства
            </button>

            <button onclick="loadModule('expert')">
                2.5.1 Работа в жюри
            </button>

            <button onclick="loadModule('technologies')">
                2.6.1 Педагогические технологии
            </button>

            <hr>

            <button onclick="logout()">
                Выход
            </button>

        </aside>

        <main class="content">

            <div id="content"></div>

        </main>

    </div>

    <!-- MODAL -->

    <div class="modal hidden" id="modal">

        <div class="modal-content">

            <h2 id="modalTitle"></h2>

            <div id="modalFields"></div>

            <div class="modal-buttons">

                <button onclick="saveItem()">
                    Сохранить
                </button>

                <button onclick="closeModal()">
                    Закрыть
                </button>

            </div>

        </div>

    </div>

    <script src="js/app.js"></script>

</body>

</html>
